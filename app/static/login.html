<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <title>WoW 한밤 레이드 로그 분석기 — 로그인</title>
  <link rel="stylesheet" href="/static/main.css">
  <style>
    body { display: flex; align-items: center; justify-content: center;
           height: 100vh; grid-template-rows: none; }
    .login-card {
      background: var(--bg-1); border: 1px solid var(--border);
      border-radius: 6px; padding: 32px 36px;
      min-width: 320px; max-width: 380px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    }
    .login-card h1 {
      color: var(--accent); font-size: 14pt; font-weight: 600;
      margin: 0 0 6px 0;
    }
    .login-card .sub { color: var(--text-mute); font-size: 11px; margin-bottom: 24px; }
    .login-card label { display: block; color: var(--text-mute); font-size: 11px;
                        margin-top: 12px; margin-bottom: 4px; }
    .login-card input {
      width: 100%; background: var(--bg-2); color: var(--text);
      border: 1px solid var(--border); border-radius: 3px;
      padding: 8px 10px; font-family: inherit; font-size: 12px;
      box-sizing: border-box;
    }
    .login-card input:focus { outline: 1px solid var(--accent); }
    .login-card button {
      width: 100%; margin-top: 18px;
      background: var(--accent-dim); color: var(--text);
      border: 1px solid var(--accent); border-radius: 3px;
      padding: 9px; cursor: pointer; font-family: inherit; font-size: 12px;
    }
    .login-card button:hover { background: var(--accent); }
    .login-card .err {
      color: #d97757; font-size: 11px; margin-top: 12px;
      min-height: 16px; text-align: center;
    }
    .login-card .hint {
      color: var(--text-dim); font-size: 10px; margin-top: 20px;
      text-align: center; padding-top: 16px;
      border-top: 1px solid var(--border);
    }
  </style>
</head>
<body>
  <form id="login-form" class="login-card">
    <h1>WoW 한밤 레이드 로그 분석기</h1>
    <p class="sub">로그인 필요. 계정 생성은 운영자에게 문의.</p>
    <label for="username">아이디</label>
    <input type="text" id="username" name="username" required autofocus>
    <label for="password">비밀번호</label>
    <input type="password" id="password" name="password" required>
    <button type="submit">로그인</button>
    <div class="err" id="err"></div>
    <div class="hint">계정 추가: python -m app.admin add &lt;id&gt; &lt;pw&gt;</div>
  </form>
  <script>
    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;
      const err = document.getElementById('err');
      err.textContent = '로그인 중…';
      try {
        const r = await fetch('/auth/login', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({username, password}),
        });
        if (r.ok) {
          location.href = '/';
        } else {
          const t = await r.text();
          err.textContent = '실패: ' + (t || r.status);
        }
      } catch (e2) {
        err.textContent = '에러: ' + e2.message;
      }
    });
  </script>
</body>
</html>
