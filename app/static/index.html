<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <title>WoW 한밤 레이드 로그 분석기</title>
  <link rel="stylesheet" href="/static/main.css">
</head>
<body>
  <header class="topbar">
    <div class="title">WoW 한밤 레이드 로그 분석기</div>
    <nav class="tabs" id="tabs">
      <button class="tab active" data-tab="heroic">영웅 레이드</button>
      <button class="tab" data-tab="mythic">신화 레이드</button>
      <button class="tab" data-tab="arbitrary">임의 로그 분석</button>
      <button class="tab" data-tab="comparison">비교 분석</button>
    </nav>
    <div class="meta" id="meta">로딩…</div>
  </header>

  <!-- ── 영웅/신화 공용 ranking view ───────────────────────── -->
  <main class="tab-pane active" data-pane="ranking" id="pane-ranking">
    <section class="filter-row" id="filter-row">
      <label>보스
        <select id="boss-select"><option value="">(전체)</option></select>
      </label>
      <label>클래스
        <select id="class-select"><option value="">(전체)</option></select>
      </label>
      <label>전문화
        <select id="spec-select"><option value="">(전체)</option></select>
      </label>
      <span class="count" id="count"></span>
    </section>

    <div class="split-h">
      <section class="panel ranking-panel">
        <h2>랭킹 (top 100)</h2>
        <div class="table-wrap">
          <table id="ranking-table">
            <colgroup>
              <col class="col-rank">
              <col class="col-char">
              <col class="col-guild">
              <col class="col-server">
              <col class="col-dps">
              <col class="col-ilvl">
            </colgroup>
            <thead>
              <tr>
                <th>#</th><th>캐릭터</th><th>길드</th><th>서버</th>
                <th class="right">DPS</th><th class="right">ilvl</th>
              </tr>
            </thead>
            <tbody id="ranking-body"></tbody>
          </table>
        </div>
      </section>

      <section class="panel build-panel">
        <h2 id="build-title">캐릭터 빌드</h2>
        <div id="build-body" class="empty">랭킹에서 행 클릭</div>
      </section>
    </div>
  </main>

  <!-- ── 임의 로그 분석 ─────────────────────────────────────── -->
  <main class="tab-pane" data-pane="arbitrary" id="pane-arbitrary">
    <section class="arb-controls">
      <label>WCL URL
        <input type="text" id="arb-url" placeholder="https://www.warcraftlogs.com/reports/..."
               size="80">
      </label>
      <button id="arb-fetch">리포트 분석</button>
      <span class="arb-status" id="arb-status"></span>
    </section>
    <section class="arb-controls">
      <label>Fight
        <select id="arb-fight"><option value="">(URL 분석 후)</option></select>
      </label>
    </section>

    <div class="split-h">
      <section class="panel ranking-panel">
        <h2>플레이어 (fight 참가)</h2>
        <div class="table-wrap">
          <table id="arb-player-table">
            <thead>
              <tr>
                <th>캐릭터</th><th>Source ID</th><th></th>
              </tr>
            </thead>
            <tbody id="arb-player-body"></tbody>
          </table>
        </div>
      </section>

      <section class="panel build-panel">
        <h2 id="arb-build-title">캐릭터 빌드</h2>
        <div id="arb-build-body" class="empty">플레이어 클릭</div>
      </section>
    </div>
  </main>

  <!-- ── 비교 분석 (row-based: 상하 row + 우측 사이드바) ─────── -->
  <main class="tab-pane" data-pane="comparison" id="pane-comparison">
    <div class="comp-grid">
      <!-- 위쪽 row -->
      <section class="comp-row" data-row="top">
        <div class="row-header">
          <span class="row-label">▲ 위 row</span>
          <input type="text" class="row-url" placeholder="WCL URL" data-row-url="top">
          <button class="row-fetch" data-row-fetch="top">분석</button>
          <select class="row-fight" data-row-fight="top"><option value="">(URL 분석 후)</option></select>
          <span class="row-meta" data-row-meta="top"></span>
        </div>
        <div class="row-body">
          <div class="row-players">
            <table class="row-player-table">
              <thead><tr><th>캐릭터</th></tr></thead>
              <tbody data-row-pbody="top"></tbody>
            </table>
          </div>
          <iframe class="row-tl" id="row-tl-top" title="위 타임라인"></iframe>
        </div>
      </section>
      <!-- 아래쪽 row -->
      <section class="comp-row" data-row="bottom">
        <div class="row-header">
          <span class="row-label">▼ 아래 row</span>
          <input type="text" class="row-url" placeholder="WCL URL" data-row-url="bottom">
          <button class="row-fetch" data-row-fetch="bottom">분석</button>
          <select class="row-fight" data-row-fight="bottom"><option value="">(URL 분석 후)</option></select>
          <span class="row-meta" data-row-meta="bottom"></span>
        </div>
        <div class="row-body">
          <div class="row-players">
            <table class="row-player-table">
              <thead><tr><th>캐릭터</th></tr></thead>
              <tbody data-row-pbody="bottom"></tbody>
            </table>
          </div>
          <iframe class="row-tl" id="row-tl-bottom" title="아래 타임라인"></iframe>
        </div>
      </section>
      <!-- 우측 사이드바: 등록 캐릭터 + 최근 로그 -->
      <aside class="comp-sidebar">
        <div class="sb-section">
          <div class="sb-head">
            <span>등록 캐릭터</span>
            <button id="char-add" title="새 캐릭터 등록 폼 열기">+</button>
          </div>
          <!-- 등록 폼 — prompt() 가 pywebview 에서 동작 안할 수 있어 inline -->
          <form id="char-add-form" class="char-form" style="display:none">
            <input type="text" id="cf-name" placeholder="캐릭 이름 (대소문자)" required>
            <input type="text" id="cf-server" placeholder="서버 slug (azshara, durotan, ...)" required>
            <select id="cf-region">
              <option value="kr" selected>kr</option>
              <option value="us">us</option>
              <option value="eu">eu</option>
              <option value="tw">tw</option>
            </select>
            <div class="cf-buttons">
              <button type="submit" class="cf-ok">등록</button>
              <button type="button" class="cf-cancel">취소</button>
            </div>
            <div class="cf-error" id="cf-error"></div>
          </form>
          <ul class="char-list" id="char-list">
            <li class="empty">+ 버튼으로 등록</li>
          </ul>
        </div>
        <div class="sb-section">
          <div class="sb-head">
            <span id="reports-head">최근 로그</span>
          </div>
          <ul class="reports-list" id="reports-list">
            <li class="empty">캐릭 클릭</li>
          </ul>
        </div>
        <div class="sb-section">
          <label class="sb-buff-toggle">
            <input type="checkbox" id="comp-buff-chk" checked> 버프 표시
          </label>
        </div>
      </aside>
    </div>
  </main>

  <script src="/static/main.js"></script>
</body>
</html>
