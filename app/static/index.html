<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <title>WoW 한밤 레이드 로그 분석기</title>
  <link rel="stylesheet" href="/static/main.css">
</head>
<body>
  <header class="topbar">
    <div class="title">WoW 한밤 레이드 로그 분석기</div>
    <nav class="tabs" id="tabs">
      <button class="tab active" data-tab="heroic">영웅 레이드</button>
      <button class="tab" data-tab="mythic">신화 레이드</button>
      <button class="tab" data-tab="arbitrary">임의 로그 분석</button>
      <button class="tab" data-tab="comparison">비교 분석</button>
    </nav>
    <div class="meta" id="meta">로딩…</div>
  </header>

  <!-- ── 영웅/신화 공용 ranking view ───────────────────────── -->
  <main class="tab-pane active" data-pane="ranking" id="pane-ranking">
    <section class="filter-row" id="filter-row">
      <label>보스
        <select id="boss-select"><option value="">(전체)</option></select>
      </label>
      <label>클래스
        <select id="class-select"><option value="">(전체)</option></select>
      </label>
      <label>전문화
        <select id="spec-select"><option value="">(전체)</option></select>
      </label>
      <span class="count" id="count"></span>
    </section>

    <div class="split-h">
      <section class="panel ranking-panel">
        <h2>랭킹 (top 100)</h2>
        <div class="table-wrap">
          <table id="ranking-table">
            <colgroup>
              <col class="col-rank">
              <col class="col-char">
              <col class="col-guild">
              <col class="col-server">
              <col class="col-dps">
              <col class="col-ilvl">
            </colgroup>
            <thead>
              <tr>
                <th>#</th><th>캐릭터</th><th>길드</th><th>서버</th>
                <th class="right">DPS</th><th class="right">ilvl</th>
              </tr>
            </thead>
            <tbody id="ranking-body"></tbody>
          </table>
        </div>
      </section>

      <section class="panel build-panel">
        <h2 id="build-title">캐릭터 빌드</h2>
        <div id="build-body" class="empty">랭킹에서 행 클릭</div>
      </section>
    </div>
  </main>

  <!-- ── 임의 로그 분석 ─────────────────────────────────────── -->
  <main class="tab-pane" data-pane="arbitrary" id="pane-arbitrary">
    <section class="arb-controls">
      <label>WCL URL
        <input type="text" id="arb-url" placeholder="https://www.warcraftlogs.com/reports/..."
               size="80">
      </label>
      <button id="arb-fetch">리포트 분석</button>
      <span class="arb-status" id="arb-status"></span>
    </section>
    <section class="arb-controls">
      <label>Fight
        <select id="arb-fight"><option value="">(URL 분석 후)</option></select>
      </label>
    </section>

    <div class="split-h">
      <section class="panel ranking-panel">
        <h2>플레이어 (fight 참가)</h2>
        <div class="table-wrap">
          <table id="arb-player-table">
            <thead>
              <tr>
                <th>캐릭터</th><th>Source ID</th><th></th>
              </tr>
            </thead>
            <tbody id="arb-player-body"></tbody>
          </table>
        </div>
      </section>

      <section class="panel build-panel">
        <h2 id="arb-build-title">캐릭터 빌드</h2>
        <div id="arb-build-body" class="empty">플레이어 클릭</div>
      </section>
    </div>
  </main>

  <!-- ── 비교 분석 ─────────────────────────────────────────── -->
  <main class="tab-pane" data-pane="comparison" id="pane-comparison">
    <!-- 상단: 좌우 패널 -->
    <div class="comp-top">
      <section class="comp-side" data-side="left">
        <div class="comp-head"><span class="side-label">좌측</span><span class="comp-stat" data-side-stat="left"></span></div>
        <div class="comp-controls">
          <input type="text" class="comp-url" placeholder="WCL URL" data-side-url="left">
          <button class="comp-fetch" data-side-fetch="left">분석</button>
        </div>
        <select class="comp-fight" data-side-fight="left"><option value="">(URL 분석 후)</option></select>
        <div class="comp-players">
          <table class="comp-player-table" data-side-table="left">
            <thead><tr><th>캐릭터</th><th>Source</th></tr></thead>
            <tbody data-side-pbody="left"></tbody>
          </table>
        </div>
        <div class="comp-build empty" data-side-build="left">캐릭 클릭</div>
      </section>
      <section class="comp-side" data-side="right">
        <div class="comp-head"><span class="side-label">우측</span><span class="comp-stat" data-side-stat="right"></span></div>
        <div class="comp-controls">
          <input type="text" class="comp-url" placeholder="WCL URL" data-side-url="right">
          <button class="comp-fetch" data-side-fetch="right">분석</button>
        </div>
        <select class="comp-fight" data-side-fight="right"><option value="">(URL 분석 후)</option></select>
        <div class="comp-players">
          <table class="comp-player-table" data-side-table="right">
            <thead><tr><th>캐릭터</th><th>Source</th></tr></thead>
            <tbody data-side-pbody="right"></tbody>
          </table>
        </div>
        <div class="comp-build empty" data-side-build="right">캐릭 클릭</div>
      </section>
    </div>
    <!-- 하단: 딜사이클 위아래 stack -->
    <div class="comp-bottom">
      <div class="comp-bottom-head">
        <span>딜사이클 비교 (위=좌 · 아래=우)</span>
        <label class="comp-buff-toggle">
          <input type="checkbox" id="comp-buff-chk" checked> 버프 표시
        </label>
      </div>
      <iframe class="comp-tl" id="comp-tl-left" title="좌측 타임라인"></iframe>
      <iframe class="comp-tl" id="comp-tl-right" title="우측 타임라인"></iframe>
    </div>
  </main>

  <script src="/static/main.js"></script>
</body>
</html>
